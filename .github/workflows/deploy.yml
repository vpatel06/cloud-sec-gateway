name: Deploy Secure WireGuard Gateway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Execute Remote Deployment via AWS SSM
        run: |
          # Convert configurations into single-line Base64 blobs to prevent JSON breakage
          DOCKERFILE_B64=$(base64 -w 0 Dockerfile)
          COMPOSE_B64=$(base64 -w 0 docker-compose.yml)
          WG_B64=$(base64 -w 0 wireguard_config/wg0.conf)

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=i-0620df35f28e95e62" \
            --comment "Deploying updated WireGuard container stack over SSM" \
            --parameters "{\"commands\":[
              \"mkdir -p /home/ubuntu/cloud-sec-gateway/wireguard_config\",
              \"echo '$DOCKERFILE_B64' | base64 -d > /home/ubuntu/cloud-sec-gateway/Dockerfile\",
              \"echo '$COMPOSE_B64' | base64 -d > /home/ubuntu/cloud-sec-gateway/docker-compose.yml\",
              \"echo '$WG_B64' | base64 -d > /home/ubuntu/cloud-sec-gateway/wireguard_config/wg0.conf\",
              \"cd /home/ubuntu/cloud-sec-gateway\",
              \"sudo docker compose down || true\",
              \"sudo docker compose up -d --build\"
            ]}" \
            --query "Command.CommandId" \
            --output text