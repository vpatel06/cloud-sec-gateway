name: Deploy Secure WireGuard Gateway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Execute Remote Deployment via AWS SSM
        run: |
          # Read file contents and escape them cleanly for JSON delivery
          DOCKERFILE_CONTENT=$(cat Dockerfile | jq -aR .)
          COMPOSE_CONTENT=$(cat docker-compose.yml | jq -aR .)
          WG_CONTENT=$(cat wireguard_config/wg0.conf | jq -aR .)

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=i-0620df35f28e95e62" \
            --comment "Deploying updated WireGuard container stack over SSM" \
            --parameters "{\"commands\":[
              \"mkdir -p /home/ubuntu/cloud-sec-gateway/wireguard_config\",
              \"echo $DOCKERFILE_CONTENT > /home/ubuntu/cloud-sec-gateway/Dockerfile.tmp && jq -r . /home/ubuntu/cloud-sec-gateway/Dockerfile.tmp > /home/ubuntu/cloud-sec-gateway/Dockerfile && rm /home/ubuntu/cloud-sec-gateway/Dockerfile.tmp\",
              \"echo $COMPOSE_CONTENT > /home/ubuntu/cloud-sec-gateway/compose.tmp && jq -r . /home/ubuntu/cloud-sec-gateway/compose.tmp > /home/ubuntu/cloud-sec-gateway/docker-compose.yml && rm /home/ubuntu/cloud-sec-gateway/compose.tmp\",
              \"echo $WG_CONTENT > /home/ubuntu/cloud-sec-gateway/wg.tmp && jq -r . /home/ubuntu/cloud-sec-gateway/wg.tmp > /home/ubuntu/cloud-sec-gateway/wireguard_config/wg0.conf && rm /home/ubuntu/cloud-sec-gateway/wg.tmp\",
              \"cd /home/ubuntu/cloud-sec-gateway\",
              \"sudo docker compose down || true\",
              \"sudo docker compose up -d --build\"
            ]}" \
            --query "Command.CommandId" \
            --output text